# modified from .venv/Lib/minisweagent/config/benchmarks/swebench.yaml

environment:
  cwd: "." # TODO: dynamically set this
  timeout: 60
  interpreter: ["bash", "-c"]
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: "off"
    TQDM_DISABLE: "1"
  environment_class: local # docker


agent:
  system_template: |
    You are a helpful assistant that can interact with a computer shell to solve programming tasks.
    Your working directory is {{cwd}}. All changes must stay within this directory.
  instance_template: |
    <issue>
    {{task}}
    </issue>

    <instructions>
    # Task Instructions

    ## Overview

    You are a software engineer working in a real repository. Your job is to fix the issue above
    and open a pull request with your changes. Work interactively: issue commands, observe results,
    and iterate until the fix is correct.

    For each response:

    1. Include a THOUGHT section explaining your reasoning
    2. Provide one or more bash tool calls to execute

    ## Recommended Workflow

    1. Analyze the codebase — find and read relevant files
    2. Reproduce the issue with a minimal script or test
    3. Edit the source code to fix the issue
    4. Run the existing test suite and verify your reproduction case passes
    5. Commit, push, and open a pull request

    ## Command Execution Rules

    - You MUST include AT LEAST ONE bash tool call per response
    - Multiple independent commands can be issued in one response
    - Directory and environment variable changes are not persistent across commands;
      prefix commands with `cd /path && ...` as needed
    - Always use non-interactive flags (-y, -f, --no-edit, etc.)
    - Avoid interactive tools (vi, nano, etc.)

    ## Submission

    When your fix is complete and tests pass, open a pull request. Follow these steps IN ORDER
    with SEPARATE commands:

    Step 1: Stage and commit your changes
    Only commit files relevant to the fix (source files, not reproduction scripts or temp files).
    ```bash
    git add path/to/changed/file1 path/to/changed/file2
    git commit -m "fix: concise description of what was fixed and why"
    ```

    Step 2: Push the branch
    ```bash
    git push origin HEAD
    ```

    Step 3: Open the pull request
    Write a title and body that explain what changed and why, referencing the issue.
    ```bash
    gh pr create --title "fix: <title>" --body "<what changed, why, and how it was tested>"
    ```

    Step 4: Confirm submission (EXACT command required)
    ```bash
    echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT
    ```

    <CRITICAL>
    - You CANNOT continue working after the confirmation command in Step 4.
    - Do not combine Step 4 with any other command using &&.
    </CRITICAL>
    </instructions>
  step_limit: 250
  cost_limit: 3.

model:
  observation_template: |
    {% if output.exception_info -%}
    <exception>{{output.exception_info}}</exception>
    {% endif -%}
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    Please try a different command that produces less output.
    If you're looking at a file you can try use head, tail or sed to view a smaller number of lines selectively.
    If you're using grep or find and it produced too much output, you can use a more selective search pattern.
    If you really need to see something from the full command's output, you can redirect output to a file and then search in that file.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ elided_chars }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}
  format_error_template: |
    Tool call error:

    <error>
    {{error}}
    </error>

    Here is general guidance on how to submit correct toolcalls:

    Every response needs to use the 'bash' tool at least once to execute commands.

    Call the bash tool with your command as the argument:
    - Tool: bash
    - Arguments: {"command": "your_command_here"}

    If you have completed your assignment, please consult the first message about how to
    submit your solution (you will not be able to continue working on this task after that).
  model_name: "gemini/gemini-3.1-flash-lite-preview"
  model_kwargs:
    drop_params: true
    temperature: 0.0
    parallel_tool_calls: true