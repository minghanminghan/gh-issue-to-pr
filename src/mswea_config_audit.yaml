# Audit config for the scanner agent (code quality auditor mode)
# Lower step/cost limits than the fix agent — scanning is cheaper

environment:
  cwd: "." # set dynamically at runtime
  timeout: 60
  interpreter: ["bash", "-c"]
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: "off"
    TQDM_DISABLE: "1"
  environment_class: local


agent:
  system_template: |
    You are a code quality auditor. Your job is to explore the codebase, run tests, check
    coverage, and identify concrete improvement opportunities.

    **Do NOT modify any source files.** You are in read-only audit mode.

    Your working directory is {{cwd}}.

  instance_template: |
    <task>
    Audit the codebase and produce a JSON list of improvement candidates.

    ## Pre-seeded hints (run before you started)

    ### TODO/FIXME/HACK occurrences
    {{todos}}

    ### Open GitHub issues (do NOT duplicate these)
    {{open_issues}}

    ### Recent git log
    {{git_log}}
    </task>

    <instructions>
    # Audit Instructions

    ## Your goal
    Explore the codebase, run real tools, and identify 3–8 concrete improvement candidates.

    ## Workflow
    1. Read source files in `src/` to understand structure
    2. Run `uv run pytest --tb=short -q` to find failing tests
    3. Run `uv run pytest --cov=src --cov-report=term-missing -q` for coverage
    4. Look at TODO/FIXME hints above; investigate each one
    5. Check error handling in critical paths
    6. Do NOT duplicate any open GitHub issue listed above

    ## Output format
    Write a JSON array to the file path `{{scan_output_path}}`:

    ```json
    [
      {
        "title": "Verb-led title under 80 chars",
        "body": "## Problem\n...\n## Expected\n...\n## Steps\n...",
        "category": "test_coverage|failing_test|error_handling|todo_fixme|performance|code_quality|docs",
        "priority": "critical|high|medium|low",
        "affected_files": ["src/foo.py"],
        "fingerprint": "",
        "evidence": "Exact quote or command output justifying the issue"
      }
    ]
    ```

    ## Priority rules
    - CRITICAL: failing tests, import errors
    - HIGH: missing error handling, coverage < 40%, security issues
    - MEDIUM: TODO/FIXME items, low coverage (40–60%), code smells
    - LOW: docs, refactors, style

    ## Rules
    - Must cite specific file + line for `evidence`
    - `fingerprint` field: leave as empty string — it will be computed automatically
    - Do NOT modify any source files
    - Do NOT create issues that duplicate the open issues listed above

    ## Submission
    Step 1: Write JSON to {{scan_output_path}}
    ```bash
    cat > {{scan_output_path}} << 'ENDJSON'
    [...]
    ENDJSON
    ```

    Step 2: Confirm (EXACT command):
    ```bash
    echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT
    ```
    </instructions>

  step_limit: 50
  cost_limit: 1.0


model:
  observation_template: |
    {% if output.exception_info -%}
    <exception>{{output.exception_info}}</exception>
    {% endif -%}
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    Please try a different command that produces less output.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ elided_chars }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}
  format_error_template: |
    Tool call error:

    <error>
    {{error}}
    </error>

    Every response needs to use the 'bash' tool at least once to execute commands.
    Call the bash tool with your command as the argument:
    - Tool: bash
    - Arguments: {"command": "your_command_here"}
  model_name: "gemini/gemini-3.1-flash-lite-preview"
  model_kwargs:
    drop_params: true
    temperature: 0.0
    parallel_tool_calls: true
    timeout: 120
    num_retries: 5
